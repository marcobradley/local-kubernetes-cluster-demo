    monitoring-monitoring-k3d-kube-promet-k8s.rules.container-resource-ad3e749a-37c6-455d-8b16-16b8fa5f9900.yaml: |
      groups:
      - name: k8s.rules.container_resource
        rules:
        - expr: |-
