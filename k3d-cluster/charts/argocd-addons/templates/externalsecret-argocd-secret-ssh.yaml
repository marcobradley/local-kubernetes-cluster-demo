apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-secret-ssh-key
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    kind: {{ .Values.github.externalSecrets.store.kind }}
    name: {{ .Values.github.externalSecrets.store.name }}
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: {{ .Values.github.externalSecrets.repo.mirrorToArgoCdSecret.keyName | default "sshPrivateKey" }}
      remoteRef:
        key: {{ .Values.github.externalSecrets.repo.item | quote }}
        property: {{ .Values.github.externalSecrets.repo.sshPrivateKeyProperty | quote }}
        decodingStrategy: {{ .Values.github.externalSecrets.repo.sshPrivateKeyDecodingStrategy | default "None" | quote }}
