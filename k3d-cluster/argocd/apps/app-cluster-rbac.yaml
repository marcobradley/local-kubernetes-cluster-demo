---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 'app-cluster-rbac'
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  destination:
    namespace: 'default'
    server: 'https://kubernetes.default.svc'
  source:
    helm:
      valueFiles:
        - values.yaml
    path: 'k3d-cluster/manifests/cluster-rbac'
    repoURL: 'https://github.com/marcobradley/local-kubernetes-cluster-demo.git'
    targetRevision: 'v4.0.0'
  project: 'default'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
