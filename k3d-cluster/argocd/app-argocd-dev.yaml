---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 'app-argocd-dev'
  namespace: argocd
spec:
  destination:
    namespace: 'dev'
    server: 'https://kubernetes.default.svc'
  source:
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
    path: 'k3d-cluster/charts/api-demo'
    repoURL: 'git@github.com:marcobradley/local-kubernetes-cluster-demo.git'
    targetRevision: 'main'
  project: 'default'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: ambient
    syncOptions:
      - CreateNamespace=true