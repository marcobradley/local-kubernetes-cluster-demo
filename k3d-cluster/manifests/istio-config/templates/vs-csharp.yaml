---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: csharp-routes
  namespace: {{ .Values.csharp_ui.namespace }}
spec:
  hosts:
  - {{ .Values.csharp_ui.service.name }}
  http:
  - name: "csharp-ui-routes"
    match:
    - uri:
        prefix: "/besttimetobyorsellstock"
    route:
    - destination:
        host: {{ .Values.csharp_api.service.name }}
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: csharp-destinations
  namespace: {{ .Values.csharp_ui.namespace }}
spec:
  host: {{ .Values.csharp_api.service.name }}