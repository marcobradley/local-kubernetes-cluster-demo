apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Values.ollama_api.name }}-ingress"
  namespace: "{{ .Values.ollama_api.namespace }}"
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  ingressClassName: traefik
  rules:
    - host: "{{ .Values.ollama_api.name }}.localhost"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: "{{ .Values.ollama_api.service.name }}"
                port:
                  number: !!int "{{ .Values.ollama_api.service.port }}"