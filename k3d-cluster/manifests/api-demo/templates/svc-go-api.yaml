apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.go_api.service.name }}"
  namespace: "{{ .Values.general.namespace }}"
spec:
  ports:
  - name: http
    port: !!int "{{ .Values.go_api.service.port }}"
    protocol: TCP
    targetPort: !!int "{{ .Values.go_api.service.targetPort }}"
  selector:
    app: "{{ .Values.go_api.name }}"
status:
  loadBalancer: {}