github:
  org: ""
  rbac:
    orgGroup: marcobradley
    adminTeamGroup: marcobradley:admin
    maintainerTeamGroup: marcobradley:maintainer
  repo: local-kubernetes-cluster-demo
  externalSecrets:
    enabled: true
    store:
      kind: ClusterSecretStore
      name: k3s
    oauth:
      item: GitHub OAuth
      targetSecretName: argocd-github-oauth
      clientIdProperty: clientID
      clientSecretProperty: clientSecret
    repo:
      item: GitHub OAuth
      sshPrivateKeyProperty: sshPrivateKey
      sshPrivateKeyDecodingStrategy: Base64
      mirrorToArgoCdSecret:
        keyName: sshPrivateKey