apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-local-kubernetes-cluster-demo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  secretStoreRef:
    kind: {{ .Values.github.externalSecrets.store.kind }}
    name: {{ .Values.github.externalSecrets.store.name }}
  target:
    name: repo-local-kubernetes-cluster-demo
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: https://github.com/hmarcobradley/local-kubernetes-cluster-demo.git
  data:
    - secretKey: sshPrivateKey
      remoteRef:
        key: {{ .Values.github.externalSecrets.repo.item | quote }}
        property: {{ .Values.github.externalSecrets.repo.sshPrivateKeyProperty | quote }}
        decodingStrategy: {{ .Values.github.externalSecrets.repo.sshPrivateKeyDecodingStrategy | default "None" | quote }}
