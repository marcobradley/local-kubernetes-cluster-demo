apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.go_api.name }}-ingress
  namespace: {{ .Values.go_api.namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /songs
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.go_api.service.name }}
                port:
                  number: {{ .Values.go_api.service.port }}