apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # External URL used for OAuth callback and Argo CD links.
  url: https://argocd.localhost:8443

  dex.config: |
    connectors:
      - type: github
        id: github
        name: GitHub
        config:
          clientID: $argocd-github-oauth:clientID
          clientSecret: $argocd-github-oauth:clientSecret
          loadAllGroups: true
          {{ if .Values.github.org }}
          # Optional org restriction. Leave github.org empty to allow login without org filtering.
          orgs:
            - name: {{ .Values.github.org | quote }}
          {{ end }}
