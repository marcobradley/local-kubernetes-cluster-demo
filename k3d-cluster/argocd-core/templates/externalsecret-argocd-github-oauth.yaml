apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-github-oauth
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    kind: {{ .Values.github.externalSecrets.store.kind }}
    name: {{ .Values.github.externalSecrets.store.name }}
  target:
    # Merge into the existing Argo CD secret so built-in keys are preserved.
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: dex.github.clientID
      remoteRef:
        key: {{ .Values.github.externalSecrets.oauth.item | quote }}
        property: {{ .Values.github.externalSecrets.oauth.clientIdProperty | quote }}
    - secretKey: dex.github.clientSecret
      remoteRef:
        key: {{ .Values.github.externalSecrets.oauth.item | quote }}
        property: {{ .Values.github.externalSecrets.oauth.clientSecretProperty | quote }}
