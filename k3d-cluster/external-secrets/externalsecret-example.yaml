apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: scaleway-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-k8s
  target:
    name: scaleway-credentials
    creationPolicy: Owner
  data:
    - secretKey: accessKeyId
      remoteRef:
        key: Scaleway Credentials
        property: accessKeyId
    - secretKey: secretKey
      remoteRef:
        key: Scaleway Credentials
        property: secretKey
