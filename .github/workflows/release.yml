name: Release
on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This is important for fetching the full commit history and tags
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        id: semantic_release
        uses: cycjimmy/semantic-release-action@v4 # Use the specific action
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update major and minor release tags
        if: steps.semantic_release.outputs.new_release_published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.semantic_release.outputs.new_release_version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          FULL_TAG="v${RELEASE_VERSION}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${RELEASE_VERSION}"

          if [[ -z "${MAJOR}" || -z "${MINOR}" || -z "${PATCH}" ]]; then
            echo "Unable to parse semantic version '${RELEASE_VERSION}'."
            exit 1
          fi

          MAJOR_TAG="v${MAJOR}"
          MINOR_TAG="v${MAJOR}.${MINOR}"

          git fetch --tags --force
          TARGET_SHA="$(git rev-list -n 1 "${FULL_TAG}")"

          git tag -f "${MAJOR_TAG}" "${TARGET_SHA}"
          git tag -f "${MINOR_TAG}" "${TARGET_SHA}"

          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"
          git push "${REMOTE_URL}" "refs/tags/${MAJOR_TAG}" --force
          git push "${REMOTE_URL}" "refs/tags/${MINOR_TAG}" --force

  changelog-pr:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update CHANGELOG.md
        run: >-
          npx conventional-changelog-cli@5.0.0 -p conventionalcommits
          -i CHANGELOG.md -s -r 0

      - name: Create pull request for changelog
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GIT_ACTIONS_TOKEN }}
          commit-message: 'chore(changelog): update CHANGELOG.md'
          title: 'chore(changelog): update CHANGELOG.md'
          body: |
            Automated changelog refresh after release.
          branch: chore/update-changelog
          base: main
          add-paths: |
            CHANGELOG.md
          labels: |
            documentation
